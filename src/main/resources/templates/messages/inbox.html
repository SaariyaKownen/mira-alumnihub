<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AlumniHub - Messages</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/galaxy-theme.css" rel="stylesheet"/>
</head>
<body>
	<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="app-shell">
  

    <div class="main-content">

        <div class="topbar">
            <div class="topbar-title">
                💬 Messages
                <span class="badge bg-danger ms-2" th:if="${unreadCount > 0}"
                      th:text="${unreadCount} + ' new'"></span>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header"><h6 class="mb-0">👥 Select Someone to Message</h6></div>
                    <div class="list-group list-group-flush">
                        <a th:each="a : ${alumniList}"
                           th:if="${a.email != currentUser}"
                           th:href="@{/messages/chat/{e}(e=${a.email})}"
                           class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-3">
                            <div class="sidebar-avatar"
                                 th:text="${#strings.substring(a.fullName,0,1)}"></div>
                            <div>
                                <div style="color:#e1bee7; font-weight:bold;" th:text="${a.fullName}"></div>
                                <small style="color:#9575cd;"
                                       th:text="${a.currentJob} + ' at ' + ${a.company}"></small>
                            </div>
                            <span style="margin-left:auto; color:#9575cd;">→</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
