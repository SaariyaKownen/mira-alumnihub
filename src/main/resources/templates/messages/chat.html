<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>AlumniHub - Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/galaxy-theme.css" rel="stylesheet"/>
    <style>
        .chat-box { height: 420px; overflow-y: auto; padding: 15px; }
        .msg-sent { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .msg-received { display: flex; justify-content: flex-start; margin-bottom: 10px; }
        .msg-bubble-sent {
            background: linear-gradient(135deg,#7c4dff,#ce93d8);
            color: white; padding: 10px 15px;
            border-radius: 18px 18px 4px 18px; max-width: 65%;
        }
        .msg-bubble-received {
            background: rgba(255,255,255,0.08); color: #e1bee7;
            padding: 10px 15px; border-radius: 18px 18px 18px 4px;
            max-width: 65%; border: 1px solid rgba(206,147,216,0.2);
        }
        .msg-time { font-size: 11px; opacity: 0.7; margin-top: 4px; color:#9575cd; }
    </style>
</head>
<body>
	<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="app-shell">
    

    <div class="main-content">
        <a href="/messages" style="color:#ce93d8; text-decoration:none; font-size:13px;">
            ← Back to Messages
        </a>

        <div class="row justify-content-center mt-3">
            <div class="col-md-8">

                <div class="card mb-3">
                    <div class="card-body d-flex align-items-center gap-3 py-2">
                        <div class="sidebar-avatar"
                             th:text="${#strings.substring(receiverAlumni.fullName,0,1)}"></div>
                        <div>
                            <div style="color:#e1bee7; font-weight:bold;" th:text="${receiverAlumni.fullName}"></div>
                            <small style="color:#9575cd;"
                                   th:text="${receiverAlumni.currentJob} + ' at ' + ${receiverAlumni.company}"></small>
                        </div>
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="card-body p-0">
                        <div class="chat-box" id="chatBox">
                            <div th:if="${messages.empty}" class="text-center py-5" style="color:#9575cd;">
                                <div style="font-size:30px;">💬</div>
                                <p>No messages yet. Say hello! 👋</p>
                            </div>
                            <div th:each="msg : ${messages}">
                                <div class="msg-sent" th:if="${msg.senderEmail == currentUser}">
                                    <div>
                                        <div class="msg-bubble-sent" th:text="${msg.content}"></div>
                                        <div class="msg-time text-end"
                                             th:text="${#temporals.format(msg.sentAt, 'hh:mm a')}"></div>
                                    </div>
                                </div>
                                <div class="msg-received" th:if="${msg.senderEmail != currentUser}">
                                    <div>
                                        <div class="msg-bubble-received" th:text="${msg.content}"></div>
                                        <div class="msg-time"
                                             th:text="${#temporals.format(msg.sentAt, 'hh:mm a')}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-body">
                        <form th:action="@{/messages/send}" method="post" class="d-flex gap-2">
                            <input type="hidden" name="receiverEmail" th:value="${receiver}"/>
                            <input type="text" name="content" class="form-control"
                                   placeholder="Type your message..." required autocomplete="off"/>
                            <button type="submit" class="btn btn-success px-4">📨 Send</button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    chatBox.scrollTop = chatBox.scrollHeight;
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
