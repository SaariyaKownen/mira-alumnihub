<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MIRA AlumniHub - Students</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/galaxy-theme.css" rel="stylesheet"/>
</head>
<body>
	<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="app-shell">

    <div class="main-content">

        <div class="topbar">
            <div>
                <div class="topbar-title">🎒 Current Students</div>
                <div style="color:#9575cd; font-size:13px;">
                    Connect with students looking for mentorship
                </div>
            </div>
            <span style="background:linear-gradient(135deg,#1565c0,#0288d1);
                         color:white; font-weight:bold; padding:6px 16px;
                         border-radius:16px; font-size:13px;"
                  th:text="${studentList.size()} + ' Students'"></span>
        </div>

        <div class="card text-center p-5" th:if="${studentList.empty}">
            <div style="font-size:50px;">🎒</div>
            <h4 style="color:#9575cd; margin-top:10px;">No students registered yet!</h4>
            <a href="/register-student" class="btn mt-2"
               style="background:linear-gradient(135deg,#1565c0,#0288d1); color:white;">
                Register as Student
            </a>
        </div>

        <div class="row g-4" th:if="${!studentList.empty}">
            <div class="col-md-4" th:each="student : ${studentList}">
                <div class="card h-100" style="border-top:4px solid #0288d1 !important;">
                    <div class="card-body text-center p-4">

                        <img th:if="${student.photoPath != null}"
                             th:src="@{/photos/{p}(p=${student.photoPath})}"
                             style="width:70px; height:70px; border-radius:50%;
                                    object-fit:cover; border:3px solid #0288d1;"
                             class="mb-3"/>
                        <div th:if="${student.photoPath == null}"
                             class="sidebar-avatar"
                             style="width:70px; height:70px; font-size:28px;
                                    background:linear-gradient(135deg,#1565c0,#0288d1);
                                    margin:0 auto 12px;"
                             th:text="${#strings.substring(student.fullName,0,1)}"></div>

                        <h5 style="color:#e1bee7; font-weight:bold;" th:text="${student.fullName}"></h5>
                        <span class="badge mb-2 text-white"
                              style="background:linear-gradient(135deg,#1565c0,#0288d1);">🎒 Student</span>

                        <div style="color:#9575cd; font-size:13px;" th:if="${student.department != null}">
                            🏢 <span th:text="${student.department}"></span>
                        </div>
                        <div style="color:#9575cd; font-size:13px;" th:if="${student.currentYear != null}">
                            📅 <span th:text="${student.currentYear}"></span>
                        </div>
                        <div style="color:#9575cd; font-size:13px; margin-bottom:14px;" th:if="${student.skills != null}">
                            🛠️ <span th:text="${student.skills}"></span>
                        </div>

                        <div class="d-grid gap-2">
                            <a th:href="@{/messages/chat/{e}(e=${student.email})}"
                               class="btn btn-sm fw-bold text-white"
                               style="background:linear-gradient(135deg,#1565c0,#0288d1);">
                                💬 Message Student
                            </a>
                            <a th:href="@{/profile/{id}(id=${student.id})}"
                               class="btn btn-sm fw-bold"
                               style="border:1px solid #0288d1; color:#81d4fa;">
                                👤 View Profile
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
