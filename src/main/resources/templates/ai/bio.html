<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AlumniHub - AI Bio Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/galaxy-theme.css" rel="stylesheet"/>
</head>
<body>
	<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="app-shell">
 
    <div class="main-content">
        <div class="d-flex gap-2 flex-wrap mb-3">
            <a href="/ai/career" class="btn btn-sm fw-bold" style="border:1px solid rgba(206,147,216,0.3); color:#ce93d8;">🤖 Career Advisor</a>
            <a href="/ai/bio" class="btn btn-sm fw-bold text-white" style="background:linear-gradient(135deg,#7c4dff,#ce93d8);">📝 Bio Generator</a>
            <a href="/ai/message-assist" class="btn btn-sm fw-bold" style="border:1px solid rgba(206,147,216,0.3); color:#ce93d8;">✉️ Message Assistant</a>
            <a href="/ai/search" class="btn btn-sm fw-bold" style="border:1px solid rgba(206,147,216,0.3); color:#ce93d8;">🔍 Smart Search</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header"><h4 class="mb-0">📝 AI Bio Generator</h4><small>Generate a professional bio powered by Gemini AI</small></div>
                    <div class="card-body">
                        <div class="alert alert-info">Generate a professional LinkedIn-style bio for <strong th:text="${alumni.fullName}"></strong>!</div>
                        <form th:action="@{/ai/bio}" method="post">
                            <button type="submit" class="btn btn-primary w-100 fw-bold">✨ Generate My Bio</button>
                        </form>
                    </div>
                </div>
                <div class="card" th:if="${bio != null}">
                    <div class="card-header">✅ Your AI Bio</div>
                    <div class="card-body">
                        <div id="bioContent" style="font-size:16px; line-height:1.8; color:#e1bee7;" th:text="${bio}"></div>
                    </div>
                    <div class="card-footer">
                        <button class="btn btn-sm" style="border:1px solid rgba(206,147,216,0.3); color:#ce93d8;"
                                onclick="navigator.clipboard.writeText(document.getElementById('bioContent').innerText); alert('Copied!')">📋 Copy Bio</button>
                        <a href="/ai/career" class="btn btn-success btn-sm ms-2">🤖 Career Advice</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
