<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AlumniHub - AI Message Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/galaxy-theme.css" rel="stylesheet"/>
</head>
<body>
	<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="app-shell">

    <div class="main-content">
		<div th:replace="~{fragments/celebration :: celebration}"></div>
        <div class="d-flex gap-2 flex-wrap mb-3">
            <a href="/ai/career" class="btn btn-sm fw-bold" style="border:1px solid rgba(206,147,216,0.3); color:#ce93d8;">🤖 Career Advisor</a>
            <a href="/ai/bio" class="btn btn-sm fw-bold" style="border:1px solid rgba(206,147,216,0.3); color:#ce93d8;">📝 Bio Generator</a>
            <a href="/ai/message-assist" class="btn btn-sm fw-bold text-white" style="background:linear-gradient(135deg,#7c4dff,#ce93d8);">✉️ Message Assistant</a>
            <a href="/ai/search" class="btn btn-sm fw-bold" style="border:1px solid rgba(206,147,216,0.3); color:#ce93d8;">🔍 Smart Search</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card mb-4">
                    <div class="card-header"><h4 class="mb-0">✉️ AI Message Assistant</h4><small>Generate professional messages using Gemini AI</small></div>
                    <div class="card-body">
                        <form th:action="@{/ai/message-assist}" method="post">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Select Recipient</label>
                                <select name="receiverEmail" class="form-select" required>
                                    <option value="">Choose alumni...</option>
                                    <option th:each="a : ${alumniList}" th:if="${a.email != sender.email}"
                                            th:value="${a.email}" th:text="${a.fullName} + ' — ' + ${a.currentJob}"
                                            th:selected="${a.email == selectedReceiver}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Purpose of Message</label>
                                <input type="text" name="purpose" class="form-control" placeholder="e.g. Ask for mentorship, Job referral" required/>
                            </div>
                            <button type="submit" class="btn w-100 fw-bold text-white" style="background:linear-gradient(135deg,#7c4dff,#ce93d8);">✨ Generate Message</button>
                        </form>
                    </div>
                </div>
                <div class="card" th:if="${generatedMessage != null}">
                    <div class="card-header">✅ Generated Message</div>
                    <div class="card-body">
                        <div id="msgContent" style="font-size:15px; line-height:1.8; color:#e1bee7;" th:text="${generatedMessage}"></div>
                    </div>
                    <div class="card-footer d-flex gap-2">
                        <button class="btn btn-sm" style="border:1px solid rgba(206,147,216,0.3); color:#ce93d8;"
onclick="copyToClipboard(document.getElementById('msgContent').innerText, 'Message')"
                        <a th:href="@{/messages/chat/{e}(e=${selectedReceiver})}" class="btn btn-success btn-sm">💬 Send This Message</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
