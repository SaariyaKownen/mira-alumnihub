<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MIRA AlumniHub - Daily Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/galaxy-theme.css" rel="stylesheet"/>
</head>
<body>
	<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="app-shell">
    <div class="main-content">

        <div class="topbar">
            <div>
                <div class="topbar-title">🔥 Daily Quiz</div>
                <div style="color:#9575cd; font-size:13px;">
                    New questions every day • Earn points • Keep your streak!
                </div>
            </div>
            <div style="background:rgba(206,147,216,0.1); border:1px solid rgba(206,147,216,0.25);
                        border-radius:10px; padding:8px 16px; text-align:center;">
                <div style="color:#ce93d8; font-size:11px;">Today's Quiz</div>
                <div style="color:#e1bee7; font-weight:bold; font-size:13px;"
                     th:text="${todayDate}"></div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-7">
                <div class="card p-4" id="quizCard">
                    <div id="questionArea"></div>
                    <div id="resultArea" style="display:none; text-align:center; padding:20px;">
                        <div style="font-size:60px; margin-bottom:10px;">🎉</div>
                        <h4 style="color:#e1bee7; font-weight:bold;">Quiz Complete!</h4>
                        <p style="color:#9575cd; margin-top:8px; font-size:15px;">
                            You scored
                            <span id="finalScore"
                                  style="color:#ce93d8; font-weight:bold; font-size:20px;"></span>
                            out of 5
                        </p>
                        <p style="color:#ffd700; font-weight:bold; font-size:16px;">
                            +<span id="pointsEarned"></span> points earned!
                        </p>
                        <div id="gradeMsg" style="color:#b39ddb; margin-bottom:20px;"></div>
                        <a href="/leaderboard"
                           class="btn fw-bold text-white me-2"
                           style="background:linear-gradient(135deg,#7c4dff,#ce93d8);">
                            🏆 View Leaderboard
                        </a>
                        <button onclick="location.reload()"
                                class="btn"
                                style="border:1px solid rgba(206,147,216,0.3); color:#ce93d8;">
                            🔄 Retry Today's Quiz
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script th:inline="javascript">
const todaySetIndex = /*[[${setIndex}]]*/ 0;

// 10 sets of 5 general knowledge questions — rotates daily
const allSets = [
    // Set 0
    [
        { q: "What is the capital of France?", options: ["Berlin","Madrid","Paris","Rome"], correct: 2 },
        { q: "How many continents are there on Earth?", options: ["5","6","7","8"], correct: 2 },
        { q: "Which planet is known as the Red Planet?", options: ["Venus","Mars","Jupiter","Saturn"], correct: 1 },
        { q: "Who painted the Mona Lisa?", options: ["Van Gogh","Picasso","Leonardo da Vinci","Michelangelo"], correct: 2 },
        { q: "What is the largest ocean on Earth?", options: ["Atlantic","Indian","Arctic","Pacific"], correct: 3 }
    ],
    // Set 1
    [
        { q: "What is the chemical symbol for Gold?", options: ["Go","Gd","Au","Ag"], correct: 2 },
        { q: "How many bones are in the adult human body?", options: ["186","206","226","246"], correct: 1 },
        { q: "Which country is the largest by area?", options: ["China","USA","Canada","Russia"], correct: 3 },
        { q: "What is the speed of light (approx)?", options: ["300,000 km/s","150,000 km/s","450,000 km/s","200,000 km/s"], correct: 0 },
        { q: "Who wrote Romeo and Juliet?", options: ["Charles Dickens","William Shakespeare","Jane Austen","Homer"], correct: 1 }
    ],
    // Set 2
    [
        { q: "What is the smallest country in the world?", options: ["Monaco","San Marino","Vatican City","Liechtenstein"], correct: 2 },
        { q: "Which element has the symbol 'O'?", options: ["Gold","Oxygen","Osmium","Oganesson"], correct: 1 },
        { q: "In which year did World War II end?", options: ["1943","1944","1945","1946"], correct: 2 },
        { q: "What is the tallest mountain in the world?", options: ["K2","Kangchenjunga","Everest","Lhotse"], correct: 2 },
        { q: "How many sides does a hexagon have?", options: ["5","6","7","8"], correct: 1 }
    ],
    // Set 3
    [
        { q: "Which is the longest river in the world?", options: ["Amazon","Nile","Yangtze","Mississippi"], correct: 1 },
        { q: "What gas do plants absorb during photosynthesis?", options: ["Oxygen","Nitrogen","Carbon Dioxide","Hydrogen"], correct: 2 },
        { q: "Which animal is known as the King of the Jungle?", options: ["Tiger","Elephant","Lion","Cheetah"], correct: 2 },
        { q: "How many players are on a cricket team?", options: ["9","10","11","12"], correct: 2 },
        { q: "What is the currency of Japan?", options: ["Yuan","Won","Rupee","Yen"], correct: 3 }
    ],
    // Set 4
    [
        { q: "What is the powerhouse of the cell?", options: ["Nucleus","Ribosome","Mitochondria","Golgi body"], correct: 2 },
        { q: "Which country invented the telephone?", options: ["UK","Germany","USA","Canada"], correct: 3 },
        { q: "What is 15% of 200?", options: ["25","30","35","40"], correct: 1 },
        { q: "Which planet has the most moons?", options: ["Jupiter","Saturn","Uranus","Neptune"], correct: 1 },
        { q: "Who is known as the Father of Computers?", options: ["Alan Turing","Bill Gates","Charles Babbage","Steve Jobs"], correct: 2 }
    ],
    // Set 5
    [
        { q: "What is the capital of Australia?", options: ["Sydney","Melbourne","Canberra","Brisbane"], correct: 2 },
        { q: "In which year did India gain independence?", options: ["1945","1946","1947","1948"], correct: 2 },
        { q: "What is the hardest natural substance on Earth?", options: ["Gold","Iron","Diamond","Quartz"], correct: 2 },
        { q: "How many hours are in a week?", options: ["148","158","168","178"], correct: 2 },
        { q: "Which blood type is the universal donor?", options: ["A+","B+","AB+","O-"], correct: 3 }
    ],
    // Set 6
    [
        { q: "What is the largest planet in our solar system?", options: ["Saturn","Neptune","Jupiter","Uranus"], correct: 2 },
        { q: "Which language has the most native speakers?", options: ["English","Spanish","Hindi","Mandarin Chinese"], correct: 3 },
        { q: "What is the square root of 144?", options: ["11","12","13","14"], correct: 1 },
        { q: "Who discovered penicillin?", options: ["Marie Curie","Louis Pasteur","Alexander Fleming","Edward Jenner"], correct: 2 },
        { q: "Which country hosted the 2016 Olympics?", options: ["China","UK","Brazil","Japan"], correct: 2 }
    ],
    // Set 7
    [
        { q: "What is the main ingredient in guacamole?", options: ["Tomato","Avocado","Mango","Lemon"], correct: 1 },
        { q: "How many colors are in a rainbow?", options: ["5","6","7","8"], correct: 2 },
        { q: "Which organ pumps blood through the body?", options: ["Liver","Lung","Kidney","Heart"], correct: 3 },
        { q: "What is the capital of Japan?", options: ["Osaka","Kyoto","Hiroshima","Tokyo"], correct: 3 },
        { q: "How many players are in a football (soccer) team?", options: ["9","10","11","12"], correct: 2 }
    ],
    // Set 8
    [
        { q: "Which scientist proposed the theory of relativity?", options: ["Newton","Einstein","Hawking","Bohr"], correct: 1 },
        { q: "What is the capital of Canada?", options: ["Toronto","Vancouver","Montreal","Ottawa"], correct: 3 },
        { q: "How many chambers does the human heart have?", options: ["2","3","4","5"], correct: 2 },
        { q: "Which is the smallest planet in our solar system?", options: ["Mars","Venus","Mercury","Pluto"], correct: 2 },
        { q: "What does DNA stand for?", options: ["Deoxyribonucleic Acid","Dioxynucleic Acid","Dinucleic Acid","Dynamic Nucleic Acid"], correct: 0 }
    ],
    // Set 9
    [
        { q: "Which is the most spoken language in India?", options: ["Bengali","Telugu","Hindi","Tamil"], correct: 2 },
        { q: "What is the freezing point of water in Celsius?", options: ["-10","0","10","32"], correct: 1 },
        { q: "Who wrote the Harry Potter series?", options: ["Tolkien","C.S. Lewis","J.K. Rowling","Roald Dahl"], correct: 2 },
        { q: "What is the largest continent?", options: ["Africa","North America","Europe","Asia"], correct: 3 },
        { q: "Which vitamin is produced when skin is exposed to sunlight?", options: ["Vitamin A","Vitamin B","Vitamin C","Vitamin D"], correct: 3 }
    ]
];

const questions = allSets[todaySetIndex];
let current = 0;
let score = 0;
let answered = false;

function showQuestion() {
    if (current >= questions.length) {
        finishQuiz();
        return;
    }
    const q = questions[current];
    let html = `
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <div style="color:#9575cd; font-size:13px;">
                Question ${current + 1} of ${questions.length}
            </div>
            <div style="display:flex; gap:4px;">
                ${questions.map((_,i) => `
                    <div style="width:28px; height:6px; border-radius:3px;
                                background:${i < current ? '#7c4dff' : i === current ? '#ce93d8' : 'rgba(255,255,255,0.15)'};">
                    </div>`).join('')}
            </div>
        </div>
        <h5 style="color:#e1bee7; margin-bottom:20px; font-size:16px; line-height:1.5;">
            ${q.q}
        </h5>
        <div class="d-grid gap-2" id="optionsDiv">`;

    q.options.forEach((opt, idx) => {
        html += `
            <button class="btn text-start" id="opt_${idx}"
                    style="background:rgba(255,255,255,0.08);
                           border:1px solid rgba(206,147,216,0.25);
                           color:#e1bee7; padding:12px 16px; border-radius:10px;
                           font-size:14px; transition:all 0.2s;"
                    onclick="answer(${idx})">
                <span style="background:rgba(206,147,216,0.2); color:#ce93d8;
                             border-radius:50%; width:24px; height:24px;
                             display:inline-flex; align-items:center;
                             justify-content:center; margin-right:10px;
                             font-size:12px; font-weight:bold;">
                    ${String.fromCharCode(65+idx)}
                </span>
                ${opt}
            </button>`;
    });
    html += `</div>`;
    document.getElementById('questionArea').innerHTML = html;
    answered = false;
}

function answer(idx) {
    if (answered) return;
    answered = true;
    const q = questions[current];
    const buttons = document.querySelectorAll('#optionsDiv button');

    buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) {
            btn.style.background = 'rgba(76,175,80,0.3)';
            btn.style.border = '1px solid #4CAF50';
            btn.style.color = '#81c784';
        } else if (i === idx && idx !== q.correct) {
            btn.style.background = 'rgba(244,67,54,0.3)';
            btn.style.border = '1px solid #f44336';
            btn.style.color = '#ef9a9a';
        }
    });

    if (idx === q.correct) score++;

    setTimeout(() => {
        current++;
        showQuestion();
    }, 900);
}

function finishQuiz() {
    document.getElementById('questionArea').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('finalScore').textContent = score;
    document.getElementById('pointsEarned').textContent = score * 2;

    const grades = [
        'Better luck tomorrow! 💪',
        'Good effort! Keep going! 🙂',
        'Not bad! 👍',
        'Great job! 🌟',
        'Excellent! Almost perfect! 🔥',
        '🏆 Perfect Score! Outstanding!'
    ];
    document.getElementById('gradeMsg').textContent = grades[score];

    fetch('/quiz/award', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'score=' + score
    });
}

showQuestion();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
