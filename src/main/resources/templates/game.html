<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MIRA AlumniHub - Memory Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/galaxy-theme.css" rel="stylesheet"/>
    <style>
        .game-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            max-width: 480px;
            margin: 0 auto;
        }
        .game-card {
            aspect-ratio: 1;
            border-radius: 12px;
            cursor: pointer;
            perspective: 600px;
        }
        .card-inner {
            width: 100%; height: 100%;
            position: relative;
            transition: transform 0.5s;
            transform-style: preserve-3d;
        }
        .game-card.flipped .card-inner,
        .game-card.matched .card-inner {
            transform: rotateY(180deg);
        }
        .card-face {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .card-back {
            background: linear-gradient(135deg,#5e35b1,#7c4dff);
            color: white;
        }
        .card-front {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(206,147,216,0.4);
            transform: rotateY(180deg);
            font-size: 36px;
        }
        .game-card.matched .card-front {
            background: rgba(76,175,80,0.2);
            border-color: rgba(76,175,80,0.5);
        }
        .stat-box-game {
            background: rgba(206,147,216,0.1);
            border: 1px solid rgba(206,147,216,0.25);
            border-radius: 10px;
            padding: 10px 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="app-shell">
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/celebration :: celebration}"></div>

        <div class="topbar">
            <div>
                <div class="topbar-title">🎮 Memory Match Game</div>
                <div style="color:#9575cd; font-size:13px;">
                    Match all emoji pairs to win!
                </div>
            </div>
        </div>

        <div class="d-flex gap-3 justify-content-center mb-4 flex-wrap">
            <div class="stat-box-game">
                <div style="color:#ce93d8; font-size:22px; font-weight:bold;"
                     id="moveCount">0</div>
                <div style="color:#9575cd; font-size:12px;">Moves</div>
            </div>
            <div class="stat-box-game">
                <div style="color:#ce93d8; font-size:22px; font-weight:bold;"
                     id="matchCount">0</div>
                <div style="color:#9575cd; font-size:12px;">Matches</div>
            </div>
            <div class="stat-box-game">
                <div style="color:#ce93d8; font-size:22px; font-weight:bold;"
                     id="timeCount">0s</div>
                <div style="color:#9575cd; font-size:12px;">Time</div>
            </div>
        </div>

        <div id="winMessage" class="card text-center p-3 mb-4"
             style="display:none; max-width:480px; margin:0 auto 16px;">
            <h4 style="color:#e1bee7;">🎉 You Won!</h4>
            <p style="color:#9575cd;">All pairs matched!</p>
        </div>

        <div class="game-grid" id="gameGrid"></div>

        <div class="text-center mt-4">
            <button class="btn fw-bold text-white"
                    style="background:linear-gradient(135deg,#7c4dff,#ce93d8);"
                    onclick="initGame()">
                🔄 New Game
            </button>
        </div>
    </div>
</div>

<script>
const EMOJIS = [
    '🎓','💼','🌟','🚀','🎯','💡','🏆','🎨',
    '📚','🔬','🌍','💻','🎵','⚽','🌺','🦋',
    '🍕','🚗','✈️','🎸','🐬','🦁','🌈','🎃'
];

let flipped = [], matched = 0, moves = 0, seconds = 0;
let timerInterval = null, timerStarted = false;
const PAIRS = 8;

function initGame() {
    clearInterval(timerInterval);
    flipped = []; matched = 0; moves = 0; seconds = 0;
    timerStarted = false;
    document.getElementById('moveCount').textContent = '0';
    document.getElementById('matchCount').textContent = '0';
    document.getElementById('timeCount').textContent = '0s';
    document.getElementById('winMessage').style.display = 'none';

    let pool = EMOJIS.slice().sort(() => Math.random()-0.5).slice(0, PAIRS);
    let cards = [...pool, ...pool].sort(() => Math.random()-0.5);

    const grid = document.getElementById('gameGrid');
    grid.innerHTML = '';
    cards.forEach((emoji, idx) => {
        const el = document.createElement('div');
        el.className = 'game-card';
        el.dataset.emoji = emoji;
        el.dataset.idx = idx;
        el.innerHTML = `
            <div class="card-inner">
                <div class="card-face card-back">🎓</div>
                <div class="card-face card-front">${emoji}</div>
            </div>`;
        el.addEventListener('click', () => flipCard(el, emoji));
        grid.appendChild(el);
    });
}

function flipCard(el, emoji) {
    if (el.classList.contains('flipped') ||
        el.classList.contains('matched') ||
        flipped.length === 2) return;

    if (!timerStarted) {
        timerStarted = true;
        timerInterval = setInterval(() => {
            seconds++;
            document.getElementById('timeCount').textContent = seconds + 's';
        }, 1000);
    }

    el.classList.add('flipped');
    flipped.push({ el, emoji });

    if (flipped.length === 2) {
        moves++;
        document.getElementById('moveCount').textContent = moves;
        const [a, b] = flipped;
        if (a.emoji === b.emoji) {
            setTimeout(() => {
                a.el.classList.add('matched');
                b.el.classList.add('matched');
                flipped = [];
                matched++;
                document.getElementById('matchCount').textContent = matched;
                if (matched === PAIRS) {
                    clearInterval(timerInterval);
                    document.getElementById('winMessage').style.display = 'block';
                    showCelebration('🏆', 'You Won!',
                        'Completed in ' + moves + ' moves and ' + seconds + ' seconds!');
                }
            }, 400);
        } else {
            setTimeout(() => {
                a.el.classList.remove('flipped');
                b.el.classList.remove('flipped');
                flipped = [];
            }, 900);
        }
    }
}

initGame();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
