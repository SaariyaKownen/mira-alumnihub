<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Job Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/galaxy-theme.css" rel="stylesheet"/>
</head>
<body>
	<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="app-shell">

    <div class="main-content">

        <div class="topbar">
            <div class="topbar-title">💼 Job Board</div>
            <span style="background:linear-gradient(135deg,#7c4dff,#ce93d8);
                         color:white; font-weight:bold; padding:6px 16px;
                         border-radius:16px; font-size:13px;"
                  th:text="${jobList.size()} + ' Jobs Posted'"></span>
        </div>

        <div class="card mb-4">
            <div class="card-header"><h5 class="mb-0">📢 Post a New Job</h5></div>
            <div class="card-body">
                <form th:action="@{/jobs}" th:object="${jobPost}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <input th:field="*{jobTitle}" class="form-control" placeholder="Job Title *" required/>
                        </div>
                        <div class="col-md-6">
                            <input th:field="*{company}" class="form-control" placeholder="Company *" required/>
                        </div>
                        <div class="col-md-6">
                            <input th:field="*{location}" class="form-control" placeholder="Location (e.g. Chennai, Remote)"/>
                        </div>
                        <div class="col-md-6">
                            <input th:field="*{postedBy}" class="form-control" placeholder="Your Name *" required/>
                        </div>
                        <div class="col-12">
                            <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Job Description..."></textarea>
                        </div>
                        <div class="col-12">
                            <input th:field="*{applyLink}" class="form-control" placeholder="Apply Link (e.g. https://careers.company.com)"/>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-success fw-bold px-4">📢 Post Job</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card text-center p-5" th:if="${jobList.size() == 0}">
            <h4 style="color:#9575cd;">No jobs posted yet!</h4>
            <p style="color:#9575cd;">Be the first to post a job opportunity.</p>
        </div>

        <div th:each="job : ${jobList}" class="card mb-3" style="border-left:4px solid #7c4dff !important;">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
                    <div>
                        <h5 style="color:#e1bee7; font-weight:bold;" th:text="${job.jobTitle}"></h5>
                        <h6 style="color:#ce93d8;" th:text="${job.company}"></h6>
                        <small style="color:#9575cd;">📍 <span th:text="${job.location}"></span></small>
                        <p style="color:#b39ddb; margin-top:10px;" th:text="${job.description}"></p>
                        <small style="color:#7e57c2;">
                            Posted by <strong th:text="${job.postedBy}"></strong>
                            on <span th:text="${job.postedDate}"></span>
                        </small>
                    </div>
                    <div class="d-flex flex-column gap-2">
                        <a th:href="${job.applyLink}" class="btn btn-sm btn-primary" target="_blank"
                           th:if="${job.applyLink != null and job.applyLink != ''}">🔗 Apply Now</a>
						   <a th:href="@{/jobs/delete/{id}(id=${job.id})}"
						      class="btn btn-sm btn-danger"
						      onclick="return confirm('Delete this job?')">
						      🗑️ Delete
						   </a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
