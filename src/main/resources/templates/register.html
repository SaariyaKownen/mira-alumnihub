<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Alumni Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/galaxy-theme.css" rel="stylesheet"/>
</head>
<body>
<div class="container py-5" style="max-width:600px;">
    <div class="card shadow">
        <div class="card-header text-center">
            <h4 class="mb-0">📝 Alumni Registration</h4>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/register}" th:object="${alumni}" method="post"
                  enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <input th:field="*{fullName}" class="form-control"
                           placeholder="Enter full name" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input th:field="*{email}" class="form-control"
                           placeholder="Enter email" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Password</label>
                    <div style="position:relative;">
                        <input th:field="*{password}" type="password" id="regPassword"
                               class="form-control" placeholder="Enter password" required
                               style="padding-right:42px;"/>
                        <span onclick="togglePassword('regPassword', this)"
                              style="position:absolute; right:14px; top:50%;
                                     transform:translateY(-50%); cursor:pointer;
                                     font-size:18px; user-select:none;">
                            👁️
                        </span>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Graduation Year</label>
                    <input th:field="*{graduationYear}" class="form-control" placeholder="e.g. 2024"/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Current Job Title</label>
                    <input th:field="*{currentJob}" class="form-control" placeholder="e.g. Software Engineer"/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Company</label>
                    <input th:field="*{company}" class="form-control" placeholder="e.g. TCS, Infosys"/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Profile Photo</label>
                    <input type="file" name="photo" class="form-control" accept="image/*"/>
                    <small style="color:#9575cd;">Optional — JPG, PNG (max 2MB)</small>
                </div>

                <button type="submit" class="btn btn-success w-100 fw-bold">
                    ✅ Register
                </button>
            </form>
        </div>
        <div class="card-footer text-center">
            <span style="color:#9575cd;">Already registered?</span>
            <a href="/login" style="color:#ce93d8;">Login here</a>
        </div>
    </div>
</div>

<script>
function togglePassword(fieldId, icon) {
    const field = document.getElementById(fieldId);
    if (field.type === "password") {
        field.type = "text";
        icon.textContent = "🙈";
    } else {
        field.type = "password";
        icon.textContent = "👁️";
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
