<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="celebration">
<style>
/* ── Celebration Overlay ── */
.celebrate-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(10,10,35,0.85);
    z-index: 9999;
    pointer-events: none;
    display: none;
    align-items: center;
    justify-content: center;
}
.celebrate-overlay.show {
    display: flex;
    pointer-events: all;
}
.celebrate-box {
    background: linear-gradient(160deg,#1a237e,#4a148c);
    border: 1px solid rgba(206,147,216,0.4);
    border-radius: 20px;
    padding: 36px 32px;
    text-align: center;
    max-width: 360px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(124,77,255,0.4);
    position: relative;
    overflow: hidden;
}
.celebrate-emoji { font-size: 56px; margin-bottom: 12px; }
.celebrate-title {
    color: white; font-weight: bold;
    font-size: 20px; margin-bottom: 8px;
}
.celebrate-sub {
    color: #ce93d8; font-size: 14px;
    margin-bottom: 20px; line-height: 1.6;
}
.celebrate-btn {
    background: linear-gradient(135deg,#7c4dff,#ce93d8);
    color: white; border: none;
    padding: 10px 28px;
    border-radius: 25px;
    font-weight: bold; cursor: pointer;
    font-size: 14px; margin: 0 5px;
    transition: all 0.2s;
}
.celebrate-btn:hover { opacity: 0.9; transform: scale(1.02); }
.confetti-piece {
    position: absolute; top: -10px;
    width: 8px; height: 14px; opacity: 0.9;
}

/* ── Confirm Modal ── */
.confirm-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.7);
    z-index: 9999;
    display: none;
    align-items: center;
    justify-content: center;
}
.confirm-overlay.show { display: flex; }
.confirm-box {
    background: linear-gradient(160deg,#1a237e,#311b92);
    border: 1px solid rgba(206,147,216,0.3);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
    max-width: 320px;
    width: 88%;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}
.confirm-icon { font-size: 40px; margin-bottom: 10px; }
.confirm-title {
    color: white; font-weight: bold;
    font-size: 17px; margin-bottom: 8px;
}
.confirm-sub {
    color: #9575cd; font-size: 13px;
    margin-bottom: 20px; line-height: 1.5;
}
.confirm-btns { display: flex; gap: 10px; justify-content: center; }
.btn-cancel {
    background: rgba(255,255,255,0.08);
    color: #ce93d8;
    border: 1px solid rgba(206,147,216,0.3);
    padding: 9px 22px; border-radius: 20px;
    font-weight: bold; cursor: pointer;
    font-size: 13px;
}
.btn-delete {
    background: linear-gradient(135deg,#e53935,#ff6b6b);
    color: white; border: none;
    padding: 9px 22px; border-radius: 20px;
    font-weight: bold; cursor: pointer;
    font-size: 13px;
}

/* ── Toast Notifications ── */
.toast-container {
    position: fixed;
    bottom: 24px; right: 20px;
    z-index: 9998;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 300px;
}
.toast {
    background: rgba(10,10,35,0.95);
    border: 1px solid rgba(206,147,216,0.3);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: slideInToast 0.3s ease;
    color: #e1bee7;
    font-size: 14px;
}
.toast.success { border-color: rgba(76,175,80,0.5); }
.toast.error   { border-color: rgba(244,67,54,0.5); }
.toast.info    { border-color: rgba(206,147,216,0.5); }
.toast-icon { font-size: 20px; flex-shrink: 0; }
.toast-msg { flex: 1; line-height: 1.4; }
.toast-close {
    background: none; border: none;
    color: #9575cd; cursor: pointer;
    font-size: 16px; padding: 0;
    flex-shrink: 0;
}
@keyframes slideInToast {
    from { transform: translateX(100%); opacity: 0; }
    to   { transform: translateX(0);   opacity: 1; }
}
@keyframes fadeOutToast {
    from { opacity: 1; }
    to   { opacity: 0; transform: translateX(30px); }
}

/* ── Password Toggle ── */
.pw-toggle {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(206,147,216,0.3);
    border-radius: 6px;
    padding: 4px 8px;
    color: #ce93d8;
    font-size: 13px;
    user-select: none;
    transition: all 0.2s;
}
.pw-toggle:hover {
    background: rgba(206,147,216,0.15);
}
</style>

<!-- Celebration Overlay -->
<div class="celebrate-overlay" id="celebrateOverlay">
    <div class="celebrate-box" id="celebrateBox">
        <div class="celebrate-emoji" id="celebrateEmoji">🎉</div>
        <div class="celebrate-title" id="celebrateTitle">Congratulations!</div>
        <div class="celebrate-sub" id="celebrateSub">You're doing amazing.</div>
        <button type="button" class="celebrate-btn"
                onclick="closeCelebration()">Continue ✨</button>
    </div>
</div>

<!-- Confirm Modal -->
<div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-box">
        <div class="confirm-icon">🗑️</div>
        <div class="confirm-title" id="confirmTitle">Are you sure?</div>
        <div class="confirm-sub" id="confirmSub">
            This action cannot be undone.
        </div>
        <div class="confirm-btns">
            <button class="btn-cancel" onclick="closeConfirm()">
                Cancel
            </button>
            <button class="btn-delete" id="confirmActionBtn">
                Delete
            </button>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ─── Celebration ─── */
var confettiColors = ['#7c4dff','#ce93d8','#ffd700','#4CAF50','#ff6b6b','#42a5f5'];

function showCelebration(emoji, title, sub) {
    document.getElementById('celebrateEmoji').textContent = emoji;
    document.getElementById('celebrateTitle').textContent = title;
    document.getElementById('celebrateSub').textContent = sub;
    document.getElementById('celebrateOverlay').classList.add('show');
    launchConfetti();
}
function closeCelebration() {
    document.getElementById('celebrateOverlay').classList.remove('show');
}
function launchConfetti() {
    var box = document.getElementById('celebrateBox');
    for (var i = 0; i < 30; i++) {
        (function() {
            var p = document.createElement('div');
            p.className = 'confetti-piece';
            p.style.left = (Math.random()*100)+'%';
            p.style.background = confettiColors[Math.floor(Math.random()*confettiColors.length)];
            p.style.transition = 'transform '+(Math.random()*1.5+1.5)+'s linear, opacity '+(Math.random()*1.5+1.5)+'s linear';
            box.appendChild(p);
            setTimeout(function(){ p.style.transform='translateY(420px) rotate(360deg)'; p.style.opacity='0'; }, 20);
            setTimeout(function(){ if(p.parentNode) p.remove(); }, 3000);
        })();
    }
}

/* ─── Confirm Modal ─── */
var pendingConfirmUrl = null;
function openConfirm(url, title, sub) {
    pendingConfirmUrl = url;
    document.getElementById('confirmTitle').textContent = title || 'Are you sure?';
    document.getElementById('confirmSub').textContent = sub || 'This action cannot be undone.';
    document.getElementById('confirmOverlay').classList.add('show');
}
function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('show');
    pendingConfirmUrl = null;
}
document.addEventListener('DOMContentLoaded', function() {
    var btn = document.getElementById('confirmActionBtn');
    if (btn) {
        btn.addEventListener('click', function() {
            if (pendingConfirmUrl) window.location.href = pendingConfirmUrl;
        });
    }
});

/* ─── Toast Notifications ─── */
function showToast(message, type, duration) {
    type = type || 'info';
    duration = duration || 3000;
    var icons = { success:'✅', error:'❌', info:'💜', warning:'⚠️' };
    var container = document.getElementById('toastContainer');
    var toast = document.createElement('div');
    toast.className = 'toast ' + type;
    toast.innerHTML =
        '<span class="toast-icon">'+icons[type]+'</span>'+
        '<span class="toast-msg">'+message+'</span>'+
        '<button class="toast-close" onclick="this.parentElement.remove()">✕</button>';
    container.appendChild(toast);
    setTimeout(function() {
        toast.style.animation = 'fadeOutToast 0.3s ease forwards';
        setTimeout(function(){ if(toast.parentNode) toast.remove(); }, 300);
    }, duration);
}

/* ─── Password Toggle ─── */
function togglePassword(fieldId) {
    var field = document.getElementById(fieldId);
    var btn = document.querySelector('[data-toggle="'+fieldId+'"]');
    if (field.type === 'password') {
        field.type = 'text';
        if (btn) btn.textContent = 'Hide';
    } else {
        field.type = 'password';
        if (btn) btn.textContent = 'Show';
    }
}

/* ─── Copy to Clipboard ─── */
function copyToClipboard(text, label) {
    navigator.clipboard.writeText(text).then(function() {
        showToast((label || 'Text') + ' copied to clipboard!', 'success');
    }).catch(function() {
        showToast('Could not copy. Please copy manually.', 'error');
    });
}
</script>

</div>
</body>
</html>
