<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>MIRA AlumniHub - Student Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/galaxy-theme.css" rel="stylesheet"/>
</head>
<body>
<div class="container py-5" style="max-width:600px;">
    <div class="card shadow">
        <div class="card-header text-center">
            <h4 class="mb-0">🎒 Student Registration</h4>
            <small>Register as a current student to connect with alumni</small>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/register-student}" th:object="${alumni}" method="post"
                  enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <input th:field="*{fullName}" class="form-control"
                           placeholder="Enter full name" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Email</label>
                    <input th:field="*{email}" class="form-control"
                           placeholder="Enter college email" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Password</label>
                    <div style="position:relative;">
                        <input th:field="*{password}" type="password" id="studentPassword"
                               class="form-control" placeholder="Create password" required
                               style="padding-right:42px;"/>
                        <span onclick="togglePassword('studentPassword', this)"
                              style="position:absolute; right:14px; top:50%;
                                     transform:translateY(-50%); cursor:pointer;
                                     font-size:18px; user-select:none;">
                            👁️
                        </span>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Department</label>
                    <input th:field="*{department}" class="form-control"
                           placeholder="e.g. Computer Science"/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Current Year</label>
                    <select th:field="*{currentYear}" class="form-select">
                        <option value="">Select Year</option>
                        <option value="1st Year">1st Year</option>
                        <option value="2nd Year">2nd Year</option>
                        <option value="3rd Year">3rd Year</option>
                        <option value="4th Year">4th Year</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Skills / Interests</label>
                    <input th:field="*{skills}" class="form-control"
                           placeholder="e.g. Java, Python, Web Dev"/>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Profile Photo</label>
                    <input type="file" name="photo" class="form-control" accept="image/*"/>
                    <small style="color:#9575cd;">Optional — JPG, PNG</small>
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold">
                    🎒 Register as Student
                </button>
            </form>
        </div>
        <div class="card-footer text-center">
            <span style="color:#9575cd;">Already registered?</span>
            <a href="/login" style="color:#81d4fa;">Login here</a>
            &nbsp;|&nbsp;
            <span style="color:#9575cd;">Alumni?</span>
            <a href="/register" style="color:#ce93d8;">Register here</a>
        </div>
    </div>
</div>

<script>
function togglePassword(fieldId, icon) {
    const field = document.getElementById(fieldId);
    if (field.type === "password") {
        field.type = "text";
        icon.textContent = "🙈";
    } else {
        field.type = "password";
        icon.textContent = "👁️";
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
