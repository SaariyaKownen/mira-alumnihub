<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MIRA AlumniHub - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="/galaxy-theme.css" rel="stylesheet"/>
</head>
<body>
<div style="position:relative; z-index:1;">
<div th:replace="~{fragments/celebration :: celebration}"></div>
</div>
<div class="container" style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
    <div style="width:100%; max-width:420px;">
        <div class="text-center mb-4">
            <h2 style="font-weight:bold; background:linear-gradient(135deg,#ce93d8,#7c4dff);
                       -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
                🎓MIRA AlumniHub
            </h2>
            <p style="color:#9575cd;">Connect. Network. Grow.</p>
        </div>
        <div class="card shadow">
            <div class="card-header text-center">
                <h5 class="mb-0">🔐 Login to Your Account</h5>
            </div>
            <div class="card-body p-4">
                <div class="alert alert-danger" th:if="${param.error}">
                    ❌ Invalid email or password. Please try again.
                </div>
                <div class="alert alert-success" th:if="${param.logout}">
                    ✅ You have been logged out successfully.
                </div>
                <div class="alert alert-success" th:if="${param.registered}">
                    ✅ Registration successful! Please login below.
                </div>

                <form th:action="@{/login}" method="post">
                    <label>Email</label>
                    <input type="email" name="username" class="form-control mb-3"
                           placeholder="Enter your email" required/>

                    <label>Password</label>
                    <div style="position:relative;">
                        <input type="password" id="loginPassword" name="password"
                               class="form-control mb-3"
                               placeholder="Enter your password"
                               style="padding-right:42px;" required/>
                        <span onclick="togglePassword('loginPassword', this)"
                              style="position:absolute; right:14px; top:10px;
                                     cursor:pointer; font-size:18px; user-select:none;">
                            👁️
                        </span>
                    </div>

                    <button type="submit" class="btn btn-success w-100 fw-bold">
                        🔐 Login
                    </button>
                </form>
            </div>
            <div class="card-footer text-center">
                <span style="color:#9575cd;">Don't have an account?</span>
                <a href="/register" style="color:#ce93d8;">Register as Alumni</a>
                &nbsp;|&nbsp;
                <a href="/register-student" style="color:#81d4fa;">Register as Student</a>
            </div>
        </div>
    </div>
</div>

<script>
function togglePassword(fieldId, icon) {
    const field = document.getElementById(fieldId);
    if (field.type === "password") {
        field.type = "text";
        icon.textContent = "🙈";
    } else {
        field.type = "password";
        icon.textContent = "👁️";
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:if="${param.registered}">
    window.addEventListener('DOMContentLoaded', () => {
        showCelebration('🎓', 'Welcome to MIRA AlumniHub!',
            'Your account is ready. Login below to start connecting with your network!');
    });
</script>
</body>
</html>
